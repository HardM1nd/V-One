services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: v-one-backend-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend-media:/app/media
      - backend-static:/app/staticfiles
    env_file: .env

    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 core.wsgi:application"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/post/all/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    env_file: .env
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - NGINX_BACKEND_URL=${NGINX_BACKEND_URL:-http://backend:8000}
    container_name: v-one-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend-media:
  backend-static:
